version: 0.2
phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 880729935723.dkr.ecr.ap-south-1.amazonaws.com
  build:
    commands:
      - echo Building the Docker image...
      - docker build -t brain-tasks-app:latest .
      - docker tag brain-tasks-app:latest 880729935723.dkr.ecr.ap-south-1.amazonaws.com/brain-tasks-app:latest
  post_build:
    commands:
      - echo Pushing the Docker image...
      - docker push 880729935723.dkr.ecr.ap-south-1.amazonaws.com/brain-tasks-app:latest
